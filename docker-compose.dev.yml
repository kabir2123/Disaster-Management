services:
  resq-api:
    image: golang:1.23-alpine
    working_dir: /src
    command: sh -c "go run ./cmd/api"
    volumes:
      - .:/src
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    environment:
      PORT: "8080"
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_SDK_LOAD_CONFIG: "1"
      DYNAMODB_ENDPOINT_URL: ${DYNAMODB_ENDPOINT_URL:-http://resq-dynamodb:8000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      USERS_TABLE: ${USERS_TABLE:-resq-users}
      INCIDENTS_TABLE: ${INCIDENTS_TABLE:-resq-incidents}
      RESOURCES_TABLE: ${RESOURCES_TABLE:-resq-resources}
      EVIDENCE_BUCKET: ${EVIDENCE_BUCKET:-resq-evidence}
      EVIDENCE_STORAGE_MODE: ${EVIDENCE_STORAGE_MODE:-local}
      SNS_TOPIC_ARN: ${SNS_TOPIC_ARN:-}

  resq-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8088}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  go-build-cache:
  go-mod-cache:
  frontend-node-modules:
